<div class="d-flex justify-content-center align-items-center vh-30">
  <div class="card" style="width: 100%; max-width: 1500px; ">
    <div class="card-header text-center">
      <h5><i class="fa-solid fa-pen-nib"></i> Contact Us - Get an Appraiser </h5>
    </div>
    <div class="card-body p-4">
      <form #f="ngForm">
        <div class="mb-3 row">
          <label class="col-sm-4 col-form-label">First Name: </label>
          <div class="col-sm-8">
            <input #firstName="ngModel" class="form-control"
              [ngClass]="firstName.invalid && firstName.dirty ? 'is-invalid' : ''" type="text" name="firstName"
              [(ngModel)]="contacDto.firstName" required placeholder="Please Enter Your First Name" />
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-4 col-form-label">Last Name: </label>
          <div class="col-sm-8">
            <input #lastName="ngModel" class="form-control"
              [ngClass]="lastName.invalid && lastName.dirty ? 'is-invalid' : ''" type="text" name="lastName"
              [(ngModel)]="contacDto.lastName" required placeholder="Please Enter Your Last Name" />
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-4 col-form-label">Email Addres: </label>
          <div class="col-sm-8">
            <input #email="ngModel" class="form-control" [ngClass]="email.invalid && email.dirty ? 'is-invalid' : ''"
              type="email" name="email" [(ngModel)]="contacDto.emailAddress" required
              placeholder="Please Enter Your Email Address" />
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-4 col-form-label">Phone Number: </label>
          <div class="col-sm-8">
            <input #phone="ngModel" class="form-control" [ngClass]="phone.invalid && phone.dirty ? 'is-invalid' : ''"
              type="tel" name="phone" [(ngModel)]="contacDto.phoneNumber" required
              placeholder="Please Enter Your Phone Number" />
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-4 col-form-label">Address: </label>
          <div class="col-sm-8">
            <input #phone="ngModel" class="form-control" placeholder="Please Enter Your Address"
              [ngClass]="phone.invalid && phone.dirty ? 'is-invalid' : ''" type="text" name="phone"
              [(ngModel)]="contacDto.address" required />
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-4 col-form-label">Report Type </label>
          <div class="col-sm-8">
            <select class="form-select" name="reportType" [(ngModel)]="contacDto.reportType">
              <option value="" selected class="text-center">Please Select Report Type </option>
              @for (item of reportType; track item) {
              <option class="text-center" [value]="item">{{item}}</option>
              }
            </select>
          </div>
          @if (contacDto.reportType === 'Other') {
          <label class="col-sm-4 col-form-label">Please Specify</label>
          <div class="col-sm-8">
            <textarea type="text" class="form-control mt-2 text-center" placeholder="Please Specify"
              [(ngModel)]="contacDto.adicionalInformation"></textarea>
          </div>
          }
        </div>

        <div class="mb-3 row">
          <label class="col-sm-4 col-form-label">Property Type: </label>
          <div class="col-sm-8">
            <select name="propertyType" class="form-select" [(ngModel)]="contacDto.propertyType">
              <option value="" selected class="text-center">Please Select Property Type</option>
              @for (item of propertyType; track $index) {
              <option class="text-center" [value]="item">{{item}}</option>
              }
            </select>
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-4 col-form-label">Purpose Type</label>
          <div class="col-sm-8">
            <select class="form-select" name="purposeType" [(ngModel)]="contacDto.purposeType">
              <option value="" selected class="text-center">Please Select purpose Type</option>
              @for (item of purposeType; track $index) {
              <option value="" class="text-center" [value]="item">{{item}}</option>
              }
            </select>
          </div>

          @if (contacDto.purposeType === 'Other') {
          <label class="col-sm-4 col-form-label">Please Specify</label>
          <div class="col-sm-8">
            <textarea type="text" class="form-control mt-2 text-center" placeholder="Please Specify"
              [(ngModel)]="contacDto.adicionalInformation"></textarea>
          </div>

          } @else if (contacDto.purposeType === 'Purchase') {
            <label class="col-sm-4 col-form-label">Purchase Type</label>
            <div class="col-sm-8">
              <select name="purchase" id="" class="form-select" [(ngModel)]="contacDto.purchasePurposeType">
                <option value="" class="text-center">Please Select Purchase Type</option>
                @for (item of purchase; track $index) {
                <option value="" class="text-center" [value]="item">{{item}}</option>
                }
              </select>
            </div>

            @if (contacDto.purchasePurposeType == 'New Construction') {
            <label for="" class="col-sm-4 col-form-label">Construction Company</label>
            <div class="col-sm-8">
              <select name="newconstruction" class="form-select" [(ngModel)]="contacDto.newConstructionPurposeType">
                <option value="" class="text-center">Please Select Construction Company</option>
                @for (item of newConstruction; track $index) {
                <option value="" class="text-center" [value]="item">{{item}}</option>
                }
              </select>
            </div>

            <label for="" class="col-sm-4 col-form-label">Model Of The Hause</label>
            <div class="col-sm-8">
              <select name="model" id="" class="form-select">
                <option value="" class="text-center">Please Select Model Of The Hause</option>
                @for (item of modelHause; track $index) {
                <option value="" class="text-center" [value]="item">{{item}}</option>
                }
              </select>
            </div>

            <label for="" class="col-sm-4 col-form-label">Purchase Price</label>
            <div class="col-sm-8">
              <input #price="ngModel" class="form-control" [ngClass]="price.invalid && price.dirty ? 'is-invalid' : ''"
                type="number" placeholder="Please Enter Purchase Price " name="price"
                [(ngModel)]="contacDto.purchasePricePurposeType" required />
            </div>
            }
          } @else if (contacDto.purposeType === 'Refinance') {
            
          }
        </div>

      </form>
    </div>
  </div>
</div>
