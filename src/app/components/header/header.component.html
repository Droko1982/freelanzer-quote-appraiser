<header class="mb-5">
    <div class="container">
        <div class="row d-flex align-items-center w-100 justify-content-center">
            <div class="col-md-3 col-sm-3 col-3 d-flex align-items-center">
                <div class="logo">
                    <a href="" routerLink="/" title="Home">
                        <img src="../../../assets/logo.png" class="logo" alt="Appraisal Management Logo">
                    </a>
                </div>
            </div>
            <div class="col-md-6 col-12 text-center">
                <h1 class="mb-0">Quote And Appraisal</h1>
            </div>
            <div class="col-md-3 col-sm-3 col-3 text-end d-flex align-items-center justify-content-end">
                <div class="menu-icon" (click)="openMenu()" title="Toggle Menu">
                    <i class="{{menu_icon}}"></i>
                </div>
                <div class="desktop_menu" [class.mobile_menu]="menuValue">
                    <div class="menu-icon" (click)="openMenu()">
                        <i class="{{menu_icon}}"></i>
                    </div>
                    <ul class="list-inline mb-0">
                        <li class="list-inline-item" (click)="closeMenu()">
                            <a href="" routerLink="/" class="nav-link px-2" title="Go to Home">Home</a>
                        </li>
                        <li class="list-inline-item" (click)="closeMenu()">
                            <a href="" routerLink="/services" class="nav-link px-2" title="Our services">Service</a>
                        </li>
                        <li class="list-inline-item" (click)="closeMenu()">
                            <a href="" routerLink="/contact" class="nav-link px-2" title="Contact Us">Contact</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</header>
