<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="" routerLink="/" [title]="L.t('nav_home')">
      <img src="assets/logo.svg" class="brand-logo" alt="Appraisal Canada — real estate appraisals across Canada logo">
      <span class="brand-text">
        <span class="brand-name">{{ L.t('brand_name') }}</span>
        <span class="brand-tagline">{{ L.t('brand_tagline') }}</span>
      </span>
    </a>

    <nav class="nav" [class.open]="menuValue">
      <a href="" routerLink="/" class="nav-link" (click)="closeMenu()">{{ L.t('nav_home') }}</a>
      <a href="" routerLink="/services" class="nav-link" (click)="closeMenu()">{{ L.t('nav_services') }}</a>
      <a href="" routerLink="/contact" class="nav-link nav-link-cta" (click)="closeMenu()">{{ L.t('nav_contact') }}</a>
    </nav>

    <div class="header-actions">
      <button type="button" class="lang-toggle" (click)="toggleLang()" [attr.aria-label]="L.t('lang_switch_aria')" [title]="L.t('lang_switch_aria')">
        <i class="fa-solid fa-globe"></i> {{ L.t('lang_switch') }}
      </button>
      <button type="button" class="menu-icon" (click)="openMenu()" aria-label="Menu">
        <i class="{{menu_icon}}"></i>
      </button>
    </div>
  </div>
</header>
