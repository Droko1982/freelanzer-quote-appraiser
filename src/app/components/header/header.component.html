<header>
    <div class="container">
        <div class="row">
            <h1 class="text-center">Appraisal Management</h1>
            <div class="col-md-3 col-sm-3 col-3">
                <div class="logo">
                    <img src="../../../assets/logo.png" class="logo" alt="">
                </div>
            </div>
            <div class="col-md-9 col-sm-9 col-9 text-end">
                <div class="menu-icon" (click)="openMenu()">
                    <i class="{{menu_icon}}"></i>
                </div>
                <div class="desktop_menu" [class.mobile_menu]="menuValue">
                    <ul>
                        <li (click)="closeMenu()"><a href="" routerLink="/" class="nav-link px-2">Home</a></li>
                        <li (click)="closeMenu()"><a href="" routerLink="/services" class="nav-link px-2">Service</a></li>
                        <li (click)="closeMenu()"><a href="" routerLink="/contact" class="nav-link px-2">Contact</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</header>
