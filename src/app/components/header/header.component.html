<div>
    <header class="bg-gray-800 text-white py-4">
        <div class="header-content max-w-7xl mx-auto flex items-center justify-between px-4">
            <!-- Logo y Título -->
            <div class="flex items-center space-x-4">
                <img src="../../../assets/logo.png" alt="Logo" class="w-12 h-12">
                <h1 class="text-2xl font-semibold">Appraisal Management</h1>
            </div>

            <!-- Navegación (visible en pantallas grandes) -->
            <nav class="hidden md:flex space-x-6">
                <a href="" routerLink="/" class="nav-link hover:text-gray-300 transition-colors">Home</a>
                <a href="" routerLink="/services" class="nav-link hover:text-gray-300 transition-colors">Services</a>
                <a href="" routerLink="/contact" class="nav-link hover:text-gray-300 transition-colors">Contact</a>
            </nav>

            <!-- Menú hamburguesa (visible en pantallas pequeñas) -->
            <button (click)="toggleMenu()" class="md:hidden flex items-center text-white focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        @if (isMenuOpen) {
        <!-- Menú desplegable (solo en dispositivos móviles) -->
        <nav  class="md:hidden px-4 pt-2 pb-4">
            <a href="" routerLink="/" class="block py-2 text-gray-300 hover:text-white">Home</a>
            <a href="" routerLink="/services" class="block py-2 text-gray-300 hover:text-white">Services</a>
            <a href="" routerLink="/contact" class="block py-2 text-gray-300 hover:text-white">Contact</a>
        </nav>
    }
    </header>
</div>
